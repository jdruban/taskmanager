<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleAuth()"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --text: #1a1a18;
    --text-muted: #5f5e5a;
    --text-hint: #888780;
    --accent: #534ab7;
    --accent-bg: #eeedfe;
    --accent-text: #3c3489;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --success-text: #085041;
    --warning: #854f0b;
    --warning-bg: #faeeda;
    --warning-text: #633806;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --danger-text: #791f1f;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #2c2c2a;
      --surface2: #3a3a38;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.22);
      --text: #f1efe8;
      --text-muted: #b4b2a9;
      --text-hint: #888780;
      --accent: #afa9ec;
      --accent-bg: #26215c;
      --accent-text: #cecbf6;
      --success: #5dcaa5;
      --success-bg: #04342c;
      --success-text: #9fe1cb;
      --warning: #ef9f27;
      --warning-bg: #412402;
      --warning-text: #fac775;
      --danger: #f09595;
      --danger-bg: #501313;
      --danger-text: #f7c1c1;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.connecting { background: var(--text-hint); }
  .sync-dot.saving     { background: var(--warning); }
  .sync-dot.ok         { background: var(--success); }
  .sync-dot.error      { background: var(--danger); }

  nav {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  nav button {
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 0.5px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  nav button.active {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  nav button:hover:not(.active) {
    background: var(--surface2);
    color: var(--text);
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .view { display: none; }
  .view.active { display: block; }

  .form-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .form-card h2 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-grid .full { grid-column: 1 / -1; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  input[type="text"], input[type="date"], select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(83,74,183,0.15);
  }

  textarea { resize: vertical; min-height: 72px; }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }

  .btn-primary {
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-ghost {
    padding: 6px 12px;
    background: transparent;
    color: var(--text-muted);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-card.accent .value { color: var(--accent-text); }
  .stat-card.success .value { color: var(--success-text); }
  .stat-card.warning .value { color: var(--warning-text); }
  .stat-card.danger .value { color: var(--danger-text); }

  .dashboard-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .dashboard-controls h2 {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }

  .period-select {
    padding: 6px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .range-picker-row {
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding: 10px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .range-picker-row.open { display: flex; }

  .range-sep {
    font-size: 13px;
    color: var(--text-hint);
  }

  .range-cal-wrap {
    position: relative;
    flex: 1;
    min-width: 140px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-hint);
    margin: 1.5rem 0 0.5rem;
  }

  .task-list { display: flex; flex-direction: column; gap: 6px; }

  .task-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .task-item:hover { border-color: var(--border-strong); }

  .task-item.done { opacity: 0.55; }

  .task-item.done .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .check-btn {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .check-btn svg { transition: opacity 0.15s; }
  .check-btn .icon-empty { opacity: 0.35; }
  .check-btn .icon-done { display: none; }
  .check-btn:hover { border-color: var(--success); background: var(--success-bg); }
  .check-btn:hover .icon-empty { opacity: 1; color: var(--success); }

  .task-item.done .check-btn { background: var(--success); border-color: var(--success); }
  .task-item.done .check-btn .icon-empty { display: none; }
  .task-item.done .check-btn .icon-done { display: block; }

  .undo-chip {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 2px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .undo-chip:hover { color: var(--danger-text); background: var(--danger-bg); border-color: var(--danger-text); }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .task-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-priority-high { background: var(--danger-bg); color: var(--danger-text); }
  .badge-priority-medium { background: var(--warning-bg); color: var(--warning-text); }
  .badge-priority-low { background: var(--success-bg); color: var(--success-text); }
  .badge-category { background: var(--accent-bg); color: var(--accent-text); }
  .badge-date { background: var(--surface2); color: var(--text-muted); font-size: 11px; }
  .badge-recur { background: var(--surface2); color: var(--text-hint); font-size: 11px; }

  .day-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }

  .day-btn {
    padding: 5px 10px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .day-btn:hover { background: var(--surface2); color: var(--text); }

  .day-btn.active {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 500;
  }

  .cal-wrap { position: relative; }

  .cal-trigger {
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-hint);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cal-trigger.has-date { color: var(--text); }
  .cal-trigger:hover { border-color: var(--accent); }

  .cal-popup {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    z-index: 200;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 12px;
    width: 240px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .cal-popup.open { display: block; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .cal-header span { font-size: 13px; font-weight: 500; color: var(--text); }

  .cal-nav {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    transition: background 0.12s;
    font-family: inherit;
  }

  .cal-nav:hover { background: var(--surface2); color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-dow {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-hint);
    text-align: center;
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: none;
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
    font-family: inherit;
  }

  .cal-day:hover { background: var(--surface2); }
  .cal-day.other-month { color: var(--text-hint); }
  .cal-day.cal-today { font-weight: 500; color: var(--accent-text); }
  .cal-day.cal-selected { background: var(--accent); color: #fff; font-weight: 500; }
  .cal-day.cal-selected:hover { background: var(--accent); opacity: 0.88; }

  .cal-footer { margin-top: 8px; display: flex; justify-content: flex-end; }

  .cal-clear {
    font-size: 12px;
    color: var(--text-hint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: var(--radius);
    font-family: inherit;
  }

  .cal-clear:hover { color: var(--danger-text); background: var(--danger-bg); }

  .history-toggle {
    font-size: 11px;
    color: var(--text-hint);
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 2px 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }

  .history-toggle:hover { color: var(--text); border-color: var(--border-strong); }

  .instance-history {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px solid var(--border);
  }

  .instance-history.open { display: block; }

  .instance-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 6px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
    margin: 0 -6px;
  }

  .instance-item:hover { background: var(--surface2); }

  .instance-toggle {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--success);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    pointer-events: none;
  }

  .instance-item:hover .instance-toggle { background: var(--danger); }
  .instance-item:hover .it-check { display: none; }
  .instance-item:hover .it-x { display: block; }

  .it-check { display: block; color: #fff; }
  .it-x { display: none; color: #fff; }

  .instance-date-text {
    font-size: 12px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .instance-item:hover .instance-date-text { color: var(--text); }

  .log-date-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px solid var(--border);
  }

  .log-date-row input { flex: 1; font-size: 12px; padding: 5px 8px; }

  .log-date-btn {
    font-size: 12px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.12s;
  }

  .log-date-btn:hover { color: var(--text); border-color: var(--accent); }

  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-item:hover .task-actions { opacity: 1; }

  .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-hint);
    font-size: 15px;
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-bg); color: var(--danger-text); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-hint);
    font-size: 14px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .filter-chip {
    padding: 4px 12px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .filter-chip.active {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  .overdue .badge-date { background: var(--danger-bg); color: var(--danger-text); }

  .ends-row-inner { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ends-row-inner select { flex: 1; min-width: 140px; }

  .gcal-connect-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-muted);
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: all 0.15s; white-space: nowrap;
  }
  .gcal-connect-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .gcal-connect-btn.connected { color: var(--success-text); border-color: var(--success); background: var(--success-bg); }
  .gcal-connect-btn.connected:hover { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger); }

  .gcal-item { cursor: default; }
  .gcal-icon { width: 26px; height: 26px; min-width: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .badge-gcal { background: #e8f0fe; color: #1a73e8; }
  @media (prefers-color-scheme: dark) { .badge-gcal { background: #1a2d5a; color: #8ab4f8; } }
  .gcal-link { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: var(--radius); color: var(--text-hint); text-decoration: none; font-size: 14px; flex-shrink: 0; transition: background 0.15s, color 0.15s; }
  .gcal-link:hover { background: var(--surface2); color: var(--text); }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 480px;
    max-width: 95vw;
    border: 0.5px solid var(--border-strong);
    overflow: visible;
  }

  .modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 1.25rem; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<header>
  <h1>
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <rect x="2" y="2" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5.5 9l2.5 2.5 4-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Task Manager
    <span class="sync-dot connecting" id="sync-dot" title="Connecting…"></span>
  </h1>
  <button id="gcal-btn" class="gcal-connect-btn" onclick="toggleGCal()" title="Connect Google Calendar">
    <svg width="14" height="14" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <rect x="1" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M1 7h16" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5 1v4M13 1v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span id="gcal-btn-label">Connect Calendar</span>
  </button>
  <nav>
    <button class="active" onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('add')">Add task</button>
    <button onclick="showView('all')">All tasks</button>
  </nav>
</header>

<main>
  <!-- Dashboard -->
  <div id="view-dashboard" class="view active">

<script>
  // ── Firebase ──────────────────────────────────────────────────────────────
  firebase.initializeApp({
    apiKey: "AIzaSyCu7kEFj3TilSnJyxHHkyV_cnC2yobFIOA",
    authDomain: "task-manager-7c6af.firebaseapp.com",
    projectId: "task-manager-7c6af",
    storageBucket: "task-manager-7c6af.firebasestorage.app",
    messagingSenderId: "512282328231",
    appId: "1:512282328231:web:957b53091a4f37a56fef82"
  });
  const db = firebase.firestore();
  const tasksCol = db.collection('tasks');

  function setSyncStatus(status) {
    const dot = document.getElementById('sync-dot');
    dot.className = 'sync-dot ' + status;
    dot.title = { connecting: 'Connecting…', saving: 'Saving…', ok: 'Synced', error: 'Sync error — check connection' }[status] || '';
  }

  // ── App state ─────────────────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let editingId = null;
  let activeFilter = 'all';
  let firestoreReady = false;

  // ── Persistence ───────────────────────────────────────────────────────────
  function cacheLocally() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  async function saveTask(task) {
    setSyncStatus('saving');
    cacheLocally();
    try {
      await tasksCol.doc(String(task.id)).set(task);
      setSyncStatus('ok');
    } catch (e) {
      console.error('saveTask:', e);
      setSyncStatus('error');
    }
  }

  async function removeTask(id) {
    setSyncStatus('saving');
    cacheLocally();
    try {
      await tasksCol.doc(String(id)).delete();
      setSyncStatus('ok');
    } catch (e) {
      console.error('removeTask:', e);
      setSyncStatus('error');
    }
  }

  // ── Real-time listener ────────────────────────────────────────────────────
  function initFirestore() {
    setSyncStatus('connecting');
    tasksCol.onSnapshot(snapshot => {
      const remoteTasks = snapshot.docs.map(d => d.data());

      // First snapshot: if Firestore is empty but localStorage has data, migrate
      if (!firestoreReady && remoteTasks.length === 0 && tasks.length > 0) {
        firestoreReady = true;
        const batch = db.batch();
        tasks.forEach(t => batch.set(tasksCol.doc(String(t.id)), t));
        batch.commit().catch(console.error);
        setSyncStatus('saving');
        return; // next snapshot will fire and render
      }

      firestoreReady = true;
      tasks = remoteTasks.sort((a, b) => (b.id || 0) - (a.id || 0));
      cacheLocally();
      setSyncStatus('ok');
      refresh();
    }, err => {
      console.error('onSnapshot:', err);
      setSyncStatus('error');
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function today() { return new Date().toISOString().slice(0, 10); }

  function fmt(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function isOverdue(task) { return !task.done && task.due && task.due < today(); }

  function daysUntil(dateStr) {
    if (!dateStr) return Infinity;
    return Math.round((new Date(dateStr + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000);
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── View routing ──────────────────────────────────────────────────────────
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    const labels = ['dashboard', 'add', 'all'];
    document.querySelectorAll('nav button')[labels.indexOf(name)].classList.add('active');
    if (name === 'dashboard') renderDashboard();
    if (name === 'all') renderAll();
  }

  // ── Recurrence helpers ────────────────────────────────────────────────────
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function nextDayOccurrence(dayIndex, fromDate, skipWeeks) {
    const d = new Date(fromDate + 'T00:00:00');
    let diff = (dayIndex - d.getDay() + 7) % 7 || 7;
    diff += 7 * (skipWeeks - 1);
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0, 10);
  }

  function nextWeekdaysOccurrence(days, fromDate) {
    const d = new Date(fromDate + 'T00:00:00');
    for (let i = 1; i <= 14; i++) {
      d.setDate(d.getDate() + 1);
      if (days.includes(d.getDay())) return d.toISOString().slice(0, 10);
    }
    return fromDate;
  }

  function firstOccurrenceFromToday(dayIndex) {
    const d = new Date(today() + 'T00:00:00');
    const diff = (dayIndex - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0, 10);
  }

  function advanceRecur(task) {
    const due = task.due || today();
    const days = task.recurDays || [];
    if (task.recur === 'daily') {
      const d = new Date(due + 'T00:00:00'); d.setDate(d.getDate() + 1);
      return d.toISOString().slice(0, 10);
    }
    if (task.recur === 'weekly' && days.length) return nextDayOccurrence(days[0], due, 1);
    if (task.recur === 'biweekly' && days.length) return nextDayOccurrence(days[0], due, 2);
    if (task.recur === 'weekdays' && days.length) return nextWeekdaysOccurrence(days, due);
    if (task.recur === 'monthly') {
      const d = new Date(due + 'T00:00:00'); d.setMonth(d.getMonth() + 1);
      return d.toISOString().slice(0, 10);
    }
    if (task.recur === 'yearly') {
      const d = new Date(due + 'T00:00:00'); d.setFullYear(d.getFullYear() + 1);
      return d.toISOString().slice(0, 10);
    }
    return due;
  }

  function recurLabel(task) {
    const days = (task.recurDays || []).map(d => DAY_NAMES[d]).join(', ');
    if (task.recur === 'daily') return 'daily';
    if (task.recur === 'weekly') return days ? 'every ' + days : 'weekly';
    if (task.recur === 'biweekly') return days ? 'every other ' + days : 'every 2 wks';
    if (task.recur === 'weekdays') return days || 'weekdays';
    if (task.recur === 'monthly') return 'monthly';
    if (task.recur === 'yearly') return 'yearly';
    return '';
  }

  // ── Form UI helpers ───────────────────────────────────────────────────────
  function updateRecurUI(prefix) {
    const recur = document.getElementById(prefix + '-recur').value;
    const isDay = ['weekly', 'biweekly', 'weekdays'].includes(recur);
    const isMulti = recur === 'weekdays';
    const hasRecur = recur !== '';
    document.getElementById(prefix + '-days-row').style.display = isDay ? '' : 'none';
    document.getElementById(prefix + '-due-wrap').style.display = isDay ? 'none' : '';
    document.getElementById(prefix + '-days-label').textContent = isMulti ? 'Repeat on' : 'Day of week';
    document.getElementById(prefix + '-ends-row').style.display = hasRecur ? '' : 'none';
    if (!hasRecur) {
      document.getElementById(prefix + '-end-type').value = '';
      updateEndsUI(prefix);
    }
    const dayPicker = document.getElementById(prefix + '-day-picker');
    dayPicker.dataset.multi = isMulti ? '1' : '0';
    dayPicker.querySelectorAll('.day-btn').forEach(btn => {
      btn.onclick = () => {
        if (dayPicker.dataset.multi === '0') dayPicker.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.toggle('active');
      };
    });
  }

  function updateEndsUI(prefix) {
    const type = document.getElementById(prefix + '-end-type').value;
    document.getElementById(prefix + '-end-date-wrap').style.display = type === 'date' ? '' : 'none';
    document.getElementById(prefix + '-end-count-wrap').style.display = type === 'count' ? '' : 'none';
  }

  function getSelectedDays(prefix) {
    return [...document.querySelectorAll('#' + prefix + '-day-picker .day-btn.active')]
      .map(b => parseInt(b.dataset.day));
  }

  function setSelectedDays(prefix, days) {
    document.querySelectorAll('#' + prefix + '-day-picker .day-btn').forEach(b => {
      b.classList.toggle('active', days.includes(parseInt(b.dataset.day)));
    });
  }

  // ── Task CRUD ─────────────────────────────────────────────────────────────
  function addTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const recur = document.getElementById('f-recur').value;
    const recurDays = getSelectedDays('f');
    const isDayBased = ['weekly', 'biweekly', 'weekdays'].includes(recur);
    let due = getCalDate('f');
    if (isDayBased && recurDays.length) {
      due = recur === 'weekdays' ? nextWeekdaysOccurrence(recurDays, today()) : firstOccurrenceFromToday(recurDays[0]);
    }
    const endType = document.getElementById('f-end-type').value;
    const task = {
      id: Date.now(),
      title,
      desc: document.getElementById('f-desc').value.trim(),
      due,
      priority: document.getElementById('f-priority').value,
      category: document.getElementById('f-category').value.trim(),
      recur,
      recurDays,
      recurEndType: endType,
      recurEndDate: endType === 'date' ? document.getElementById('f-end-date').value : '',
      recurEndCount: endType === 'count' ? (parseInt(document.getElementById('f-end-count').value) || null) : null,
      completedInstances: [],
      done: false,
      created: today()
    };
    tasks.unshift(task);
    saveTask(task);
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-category').value = '';
    document.getElementById('f-recur').value = '';
    document.getElementById('f-end-type').value = '';
    document.getElementById('f-end-date').value = '';
    document.getElementById('f-end-count').value = '';
    setSelectedDays('f', []);
    setCalDate('f', null);
    updateRecurUI('f');
    showView('dashboard');
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    if (t.recur) {
      if (!t.completedInstances) t.completedInstances = [];
      t.completedInstances.unshift({ date: t.due || today(), at: today() });
      const nextDue = advanceRecur(t);
      let ended = false;
      if (t.recurEndType === 'date' && t.recurEndDate && nextDue > t.recurEndDate) ended = true;
      if (t.recurEndType === 'count' && t.recurEndCount && t.completedInstances.length >= t.recurEndCount) ended = true;
      if (ended) {
        t.recur = '';
        t.recurDays = [];
        t.done = true;
      } else {
        t.due = nextDue;
      }
    } else {
      t.done = !t.done;
    }
    saveTask(t); refresh();
  }

  function undoInstance(taskId, date) {
    const t = tasks.find(t => t.id === taskId);
    if (!t) return;
    t.completedInstances = (t.completedInstances || []).filter(i => i.date !== date);
    saveTask(t); refresh();
  }

  function logInstance(taskId) {
    const input = document.getElementById('log-' + taskId);
    if (!input || !input.value) return;
    const t = tasks.find(t => t.id === taskId);
    if (!t) return;
    if (!t.completedInstances) t.completedInstances = [];
    if (t.completedInstances.some(i => i.date === input.value)) return;
    t.completedInstances.unshift({ date: input.value, at: today() });
    t.completedInstances.sort((a, b) => b.date.localeCompare(a.date));
    saveTask(t); refresh();
  }

  function toggleHistory(id) {
    const el = document.getElementById('hist-' + id);
    if (el) el.classList.toggle('open');
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    removeTask(id);
    refresh();
  }

  function openEdit(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('e-title').value = t.title;
    document.getElementById('e-desc').value = t.desc || '';
    setCalDate('e', t.due || null);
    document.getElementById('e-priority').value = t.priority;
    document.getElementById('e-category').value = t.category || '';
    document.getElementById('e-recur').value = t.recur || '';
    updateRecurUI('e');
    setSelectedDays('e', t.recurDays || []);
    document.getElementById('e-end-type').value = t.recurEndType || '';
    document.getElementById('e-end-date').value = t.recurEndDate || '';
    document.getElementById('e-end-count').value = t.recurEndCount || '';
    updateEndsUI('e');
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  function saveEdit() {
    const t = tasks.find(t => t.id === editingId);
    if (!t) return;
    const title = document.getElementById('e-title').value.trim();
    if (!title) return;
    t.title = title;
    t.desc = document.getElementById('e-desc').value.trim();
    t.due = getCalDate('e');
    t.priority = document.getElementById('e-priority').value;
    t.category = document.getElementById('e-category').value.trim();
    t.recur = document.getElementById('e-recur').value;
    t.recurDays = getSelectedDays('e');
    const eEndType = document.getElementById('e-end-type').value;
    t.recurEndType = eEndType;
    t.recurEndDate = eEndType === 'date' ? document.getElementById('e-end-date').value : '';
    t.recurEndCount = eEndType === 'count' ? (parseInt(document.getElementById('e-end-count').value) || null) : null;
    const isDayBased = ['weekly', 'biweekly', 'weekdays'].includes(t.recur);
    if (isDayBased && t.recurDays.length && !t.due) {
      t.due = t.recur === 'weekdays'
        ? nextWeekdaysOccurrence(t.recurDays, today())
        : firstOccurrenceFromToday(t.recurDays[0]);
    }
    saveTask(t);
    closeModal();
    refresh();
  }

  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Calendar ──────────────────────────────────────────────────────────────
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const calState = {};
  const calDates = { f: null, e: null, rs: null, re: null };

  function initCal(prefix) {
    const now = new Date();
    calState[prefix] = { month: now.getMonth(), year: now.getFullYear() };
  }

  function getCalDate(prefix) { return calDates[prefix] || ''; }

  function setCalDate(prefix, dateStr) {
    calDates[prefix] = dateStr || null;
    const display = document.getElementById(prefix + '-cal-display');
    const trigger = document.getElementById(prefix + '-cal-trigger');
    if (!display || !trigger) return;
    if (dateStr) {
      display.textContent = fmt(dateStr);
      trigger.classList.add('has-date');
      const d = new Date(dateStr + 'T00:00:00');
      calState[prefix] = { month: d.getMonth(), year: d.getFullYear() };
    } else {
      display.textContent = prefix === 'rs' ? 'Start date' : prefix === 're' ? 'End date' : 'Pick a date';
      trigger.classList.remove('has-date');
    }
  }

  function toggleCal(prefix) {
    const popup = document.getElementById(prefix + '-cal-popup');
    const isOpen = popup.classList.contains('open');
    ['f','e','rs','re'].forEach(p => {
      const el = document.getElementById(p + '-cal-popup');
      if (el) el.classList.remove('open');
    });
    if (!isOpen) { renderCal(prefix); popup.classList.add('open'); }
  }

  function calNav(prefix, dir) {
    const s = calState[prefix];
    s.month += dir;
    if (s.month > 11) { s.month = 0; s.year++; }
    if (s.month < 0) { s.month = 11; s.year--; }
    renderCal(prefix);
  }

  function renderCal(prefix) {
    const { month, year } = calState[prefix];
    const td = today(), sel = calDates[prefix];
    document.getElementById(prefix + '-cal-title').textContent = MONTHS[month] + ' ' + year;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const prevDays = new Date(year, month, 0).getDate();
    let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-dow">${d}</div>`).join('');
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = prevDays - i;
      const pm = month === 0 ? 11 : month - 1, py = month === 0 ? year - 1 : year;
      const ds = `${py}-${String(pm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      html += `<button class="cal-day other-month" onclick="pickDate('${prefix}','${ds}')">${d}</button>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls = (ds === td ? ' cal-today' : '') + (ds === sel ? ' cal-selected' : '');
      html += `<button class="cal-day${cls}" onclick="pickDate('${prefix}','${ds}')">${d}</button>`;
    }
    const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    for (let d = 1; d <= total - firstDay - daysInMonth; d++) {
      const nm = month === 11 ? 0 : month + 1, ny = month === 11 ? year + 1 : year;
      const ds = `${ny}-${String(nm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      html += `<button class="cal-day other-month" onclick="pickDate('${prefix}','${ds}')">${d}</button>`;
    }
    document.getElementById(prefix + '-cal-grid').innerHTML = html;
  }

  function pickDate(prefix, dateStr) {
    setCalDate(prefix, dateStr);
    document.getElementById(prefix + '-cal-popup').classList.remove('open');
    if (prefix === 'rs' || prefix === 're') {
      if (gCalToken) fetchCalendarEvents(); else renderDashboard();
    }
  }

  function clearCal(prefix) {
    setCalDate(prefix, null);
    document.getElementById(prefix + '-cal-popup').classList.remove('open');
    if (prefix === 'rs' || prefix === 're') {
      if (gCalToken) fetchCalendarEvents(); else renderDashboard();
    }
  }

  document.addEventListener('click', e => {
    ['f','e','rs','re'].forEach(prefix => {
      const popup = document.getElementById(prefix + '-cal-popup');
      if (!popup) return;
      const trigger = document.getElementById(prefix + '-cal-trigger');
      if (!popup.contains(e.target) && e.target !== trigger && !trigger.contains(e.target)) {
        popup.classList.remove('open');
      }
    });
  });

  // ── Rendering ─────────────────────────────────────────────────────────────
  function taskHTML(task, showDate = true) {
    const overdue = isOverdue(task);
    const days = daysUntil(task.due);
    let dateBadge = '';
    if (task.due) {
      const label = task.done ? fmt(task.due)
        : overdue ? `Overdue · ${fmt(task.due)}`
        : days === 0 ? 'Due today'
        : days === 1 ? 'Tomorrow'
        : fmt(task.due);
      dateBadge = `<span class="badge badge-date">${label}</span>`;
    }
    const instances = task.completedInstances || [];
    const checkSvg = `<svg class="it-check" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const xSvg = `<svg class="it-x" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
    const instanceHistory = task.recur ? `
      <div class="instance-history" id="hist-${task.id}">
        <div class="instance-list">
          ${instances.map(i => `
            <div class="instance-item" onclick="undoInstance(${task.id},'${i.date}')" title="Click to undo">
              <span class="instance-toggle">${checkSvg}${xSvg}</span>
              <span class="instance-date-text">${fmt(i.date)}</span>
            </div>`).join('')}
        </div>
        <div class="log-date-row">
          <input type="date" id="log-${task.id}" max="${today()}" />
          <button class="log-date-btn" onclick="logInstance(${task.id})">+ Log date</button>
        </div>
      </div>` : '';
    const historyBtn = task.recur
      ? `<button class="history-toggle" onclick="toggleHistory(${task.id})">${instances.length ? instances.length + ' completed' : 'Log dates'}</button>`
      : '';
    const checkIcon = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path class="icon-empty" d="M2.5 7l3 3 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path class="icon-done" d="M2.5 7l3 3 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
    const undoChip = !task.recur && task.done
      ? `<button class="undo-chip" onclick="toggleDone(${task.id})">↩ Undo</button>`
      : '';
    return `
      <div class="task-item ${task.done ? 'done' : ''} ${overdue && !task.done ? 'overdue' : ''}" data-id="${task.id}">
        <button class="check-btn" onclick="toggleDone(${task.id})" title="${task.done ? 'Mark incomplete' : 'Mark complete'}">
          ${checkIcon}
        </button>
        <div class="task-body">
          <div class="task-title">${esc(task.title)}</div>
          ${task.desc ? `<div class="task-desc">${esc(task.desc)}</div>` : ''}
          <div class="task-meta">
            <span class="badge badge-priority-${task.priority}">${task.priority}</span>
            ${task.category ? `<span class="badge badge-category">${esc(task.category)}</span>` : ''}
            ${task.recur ? `<span class="badge badge-recur">↻ ${recurLabel(task)}</span>` : ''}
            ${task.recur && task.recurEndType === 'date' && task.recurEndDate ? `<span class="badge badge-recur">ends ${fmt(task.recurEndDate)}</span>` : ''}
            ${task.recur && task.recurEndType === 'count' && task.recurEndCount ? `<span class="badge badge-recur">${(task.completedInstances||[]).length}/${task.recurEndCount} done</span>` : ''}
            ${showDate ? dateBadge : ''}
            ${historyBtn}
            ${undoChip}
          </div>
          ${instanceHistory}
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="openEdit(${task.id})" title="Edit">✎</button>
          <button class="icon-btn danger" onclick="deleteTask(${task.id})" title="Delete">✕</button>
        </div>
      </div>`;
  }

  function onPeriodChange() {
    const val = document.getElementById('period-select').value;
    document.getElementById('range-picker-row').classList.toggle('open', val === 'custom');
    if (gCalToken) fetchCalendarEvents();
    else renderDashboard();
  }

  function renderDashboard() {
    const periodVal = document.getElementById('period-select').value;
    const td = today();
    const overdue = tasks.filter(t => !t.done && t.due && t.due < td);
    const noDue = tasks.filter(t => !t.done && !t.due);
    const doneCount = tasks.reduce((sum, t) =>
      sum + (t.recur ? (t.completedInstances || []).length : (t.done ? 1 : 0)), 0);

    let upcoming = [], upcomingLabel = '';
    if (periodVal === 'today') {
      upcoming = tasks.filter(t => !t.done && t.due === td).sort((a,b) => a.due.localeCompare(b.due));
      upcomingLabel = 'Due today';
    } else if (periodVal === 'custom') {
      const rs = getCalDate('rs'), re = getCalDate('re');
      upcoming = tasks.filter(t => {
        if (t.done || !t.due) return false;
        if (rs && t.due < rs) return false;
        if (re && t.due > re) return false;
        return true;
      }).sort((a,b) => a.due.localeCompare(b.due));
      upcomingLabel = rs && re ? `${fmt(rs)} – ${fmt(re)}` : rs ? `From ${fmt(rs)}` : re ? `Until ${fmt(re)}` : 'Custom range';
    } else {
      const period = parseInt(periodVal);
      upcoming = tasks.filter(t => {
        if (t.done || !t.due || t.due < td) return false;
        return period === 0 || daysUntil(t.due) <= period;
      }).sort((a,b) => a.due.localeCompare(b.due));
      upcomingLabel = period === 0 ? 'All upcoming' : `Next ${period} days`;
    }

    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card danger"><div class="label">Overdue</div><div class="value">${overdue.length}</div></div>
      <div class="stat-card warning"><div class="label">Upcoming</div><div class="value">${upcoming.length}</div></div>
      <div class="stat-card accent"><div class="label">No due date</div><div class="value">${noDue.length}</div></div>
      <div class="stat-card success"><div class="label">Completed</div><div class="value">${doneCount}</div></div>`;

    const gcalEl = document.getElementById('gcal-section');
    if (gCalToken) {
      gcalEl.innerHTML = gCalEvents.length
        ? `<div class="section-label">Google Calendar</div><div class="task-list">${gCalEvents.map(gcalEventHTML).join('')}</div>`
        : `<div class="section-label">Google Calendar</div><div class="empty-state">No events in this period.</div>`;
    } else {
      gcalEl.innerHTML = '';
    }

    const overdueEl = document.getElementById('overdue-section');
    overdueEl.innerHTML = overdue.length
      ? `<div class="section-label">Overdue</div><div class="task-list">${overdue.map(t => taskHTML(t)).join('')}</div>`
      : '';

    const upcomingEl = document.getElementById('upcoming-section');
    upcomingEl.innerHTML = upcoming.length
      ? `<div class="section-label">${upcomingLabel}</div><div class="task-list">${upcoming.map(t => taskHTML(t)).join('')}</div>`
      : `<div class="section-label">${upcomingLabel || 'Upcoming'}</div><div class="empty-state">No tasks in this period.</div>`;

    const pendingEl = document.getElementById('pending-section');
    pendingEl.innerHTML = noDue.length
      ? `<div class="section-label">No due date</div><div class="task-list">${noDue.map(t => taskHTML(t, false)).join('')}</div>`
      : '';

    updateCategoryList();
  }

  function renderAll() {
    const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
    const chips = [['all','All'],['pending','Pending'],['done','Done'], ...cats.map(c => [c,c])];
    document.getElementById('filter-row').innerHTML = chips.map(([val, label]) =>
      `<button class="filter-chip ${activeFilter === val ? 'active' : ''}" onclick="setFilter('${val}')">${label}</button>`
    ).join('');

    let filtered = tasks;
    if (activeFilter === 'pending') filtered = tasks.filter(t => !t.done);
    else if (activeFilter === 'done') filtered = tasks.filter(t => t.done);
    else if (activeFilter !== 'all') filtered = tasks.filter(t => t.category === activeFilter);

    const sorted = [...filtered].sort((a,b) => {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    });

    document.getElementById('all-tasks-list').innerHTML = sorted.length
      ? sorted.map(t => taskHTML(t)).join('')
      : '<div class="empty-state">No tasks here.</div>';

    updateCategoryList();
  }

  function setFilter(val) { activeFilter = val; renderAll(); }

  function updateCategoryList() {
    const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
    document.getElementById('category-list').innerHTML = cats.map(c => `<option value="${c}">`).join('');
  }

  function refresh() {
    const activeView = document.querySelector('.view.active');
    if (!activeView) return;
    const name = activeView.id.replace('view-', '');
    if (name === 'dashboard') renderDashboard();
    if (name === 'all') renderAll();
  }

  // ── Google Calendar ───────────────────────────────────────────────────────
  const GCAL_CLIENT_ID = '512282328231-jo41stl60a1ifl7mvnkaaibg8s6ogoov.apps.googleusercontent.com';
  const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
  let gCalToken = null;
  let gCalEvents = [];
  let gisClient = null;

  function initGoogleAuth() {
    if (!window.google) return;
    gisClient = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (resp) => {
        if (resp.error) { console.error('GCal auth:', resp); return; }
        gCalToken = resp.access_token;
        updateGCalBtn();
        fetchCalendarEvents();
      }
    });
  }

  function toggleGCal() {
    if (gCalToken) {
      google.accounts.oauth2.revoke(gCalToken, () => {});
      gCalToken = null;
      gCalEvents = [];
      updateGCalBtn();
      renderDashboard();
    } else {
      if (!gisClient) { alert('Google auth is still loading — try again in a moment.'); return; }
      gisClient.requestAccessToken();
    }
  }

  function updateGCalBtn() {
    const btn = document.getElementById('gcal-btn');
    const label = document.getElementById('gcal-btn-label');
    if (gCalToken) {
      btn.classList.add('connected');
      label.textContent = 'Disconnect Calendar';
      btn.title = 'Disconnect Google Calendar';
    } else {
      btn.classList.remove('connected');
      label.textContent = 'Connect Calendar';
      btn.title = 'Connect Google Calendar';
    }
  }

  function gcalTimeRange() {
    const pv = document.getElementById('period-select').value;
    const td = today();
    const toISO = (d, end) => {
      const dt = new Date(d + (end ? 'T23:59:59' : 'T00:00:00'));
      return dt.toISOString();
    };
    if (pv === 'today') return { min: toISO(td, false), max: toISO(td, true) };
    if (pv === 'custom') {
      const rs = getCalDate('rs'), re = getCalDate('re');
      return { min: toISO(rs || td, false), max: re ? toISO(re, true) : null };
    }
    const days = parseInt(pv) || 365;
    const end = new Date(td + 'T23:59:59');
    end.setDate(end.getDate() + days);
    return { min: toISO(td, false), max: end.toISOString() };
  }

  async function fetchCalendarEvents() {
    if (!gCalToken) return;
    const { min, max } = gcalTimeRange();
    let url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=50&timeMin=${encodeURIComponent(min)}`;
    if (max) url += `&timeMax=${encodeURIComponent(max)}`;
    try {
      const resp = await fetch(url, { headers: { Authorization: `Bearer ${gCalToken}` } });
      if (resp.status === 401) { toggleGCal(); return; }
      const data = await resp.json();
      gCalEvents = (data.items || []).filter(e => e.status !== 'cancelled');
    } catch (e) {
      console.error('Calendar fetch:', e);
      gCalEvents = [];
    }
    renderDashboard();
  }

  function gcalEventHTML(event) {
    const startDate = event.start.date || (event.start.dateTime || '').slice(0, 10);
    const isAllDay = !!event.start.date;
    const timeLabel = !isAllDay && event.start.dateTime
      ? new Date(event.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
      : fmt(startDate);
    const desc = (event.description || '').replace(/<[^>]+>/g, '').trim();
    return `<div class="task-item gcal-item">
      <div class="gcal-icon">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1" y="3" width="16" height="14" rx="2" stroke="#1a73e8" stroke-width="1.4"/>
          <path d="M1 7h16" stroke="#1a73e8" stroke-width="1.4"/>
          <path d="M5 1v4M13 1v4" stroke="#1a73e8" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-title">${esc(event.summary || '(No title)')}</div>
        ${desc ? `<div class="task-desc">${esc(desc.slice(0, 120))}${desc.length > 120 ? '…' : ''}</div>` : ''}
        <div class="task-meta">
          <span class="badge badge-gcal">Google Calendar</span>
          ${startDate ? `<span class="badge badge-date">${timeLabel}</span>` : ''}
          ${event.location ? `<span class="badge badge-recur">${esc(event.location)}</span>` : ''}
        </div>
      </div>
      ${event.htmlLink ? `<a href="${event.htmlLink}" target="_blank" rel="noopener" class="gcal-link" title="Open in Google Calendar">↗</a>` : ''}
    </div>`;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  ['f','e','rs','re'].forEach(initCal);
  renderDashboard();
  initFirestore();
</script>
</body>
</html>
